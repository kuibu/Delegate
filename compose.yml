name: delegate

x-app-environment: &app-environment
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/delegate
  NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
  NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL:-http://localhost:3001}
  NEXT_PUBLIC_REPRESENTATIVE_URL: ${NEXT_PUBLIC_REPRESENTATIVE_URL:-http://localhost:3002}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
  TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
  DEMO_REP_SLUG: ${DEMO_REP_SLUG:-lin-founder-rep}
  COMPUTE_BROKER_URL: ${COMPUTE_BROKER_URL:-http://compute-broker:4010}
  COMPUTE_BROKER_INTERNAL_TOKEN: ${COMPUTE_BROKER_INTERNAL_TOKEN:-delegate-local-compute-token}
  COMPUTE_RUNNER_TYPE: ${COMPUTE_RUNNER_TYPE:-docker}
  COMPUTE_RUNNER_IMAGE: ${COMPUTE_RUNNER_IMAGE:-debian:bookworm-slim}
  COMPUTE_BROWSER_IMAGE: ${COMPUTE_BROWSER_IMAGE:-mcr.microsoft.com/playwright:v1.58.2-noble}
  COMPUTE_BROWSER_PLAYWRIGHT_VERSION: ${COMPUTE_BROWSER_PLAYWRIGHT_VERSION:-1.58.2}
  COMPUTE_BROWSER_MAX_COMMAND_SECONDS: ${COMPUTE_BROWSER_MAX_COMMAND_SECONDS:-120}
  COMPUTE_HOST_WORKSPACE_ROOT: ${COMPUTE_HOST_WORKSPACE_ROOT:-/Users/a/repos/Delegate}
  WORKFLOW_RUNNER_PORT: ${WORKFLOW_RUNNER_PORT:-4020}
  WORKFLOW_RUNNER_POLL_MS: ${WORKFLOW_RUNNER_POLL_MS:-5000}
  WORKFLOW_RUNNER_BATCH_SIZE: ${WORKFLOW_RUNNER_BATCH_SIZE:-10}
  WORKFLOW_APPROVAL_TIMEOUT_MINUTES: ${WORKFLOW_APPROVAL_TIMEOUT_MINUTES:-30}
  WORKFLOW_ENGINE: ${WORKFLOW_ENGINE:-local_runner}
  WORKFLOW_TEMPORAL_ADDRESS: ${WORKFLOW_TEMPORAL_ADDRESS:-}
  WORKFLOW_TEMPORAL_NAMESPACE: ${WORKFLOW_TEMPORAL_NAMESPACE:-delegate}
  WORKFLOW_TEMPORAL_TASK_QUEUE: ${WORKFLOW_TEMPORAL_TASK_QUEUE:-delegate-public-runtime}
  ARTIFACT_STORE_ENDPOINT: ${ARTIFACT_STORE_ENDPOINT:-http://artifact-store:9000}
  ARTIFACT_STORE_BUCKET: ${ARTIFACT_STORE_BUCKET:-delegate-compute-artifacts}
  ARTIFACT_STORE_ACCESS_KEY: ${ARTIFACT_STORE_ACCESS_KEY:-delegate}
  ARTIFACT_STORE_SECRET_KEY: ${ARTIFACT_STORE_SECRET_KEY:-delegate-secret-key}
  ARTIFACT_STORE_REGION: ${ARTIFACT_STORE_REGION:-us-east-1}
  OPENVIKING_ENABLED: ${OPENVIKING_ENABLED:-true}
  OPENVIKING_BASE_URL: ${OPENVIKING_BASE_URL:-http://openviking:1933}
  OPENVIKING_API_KEY: ${OPENVIKING_API_KEY:-delegate-local-root-key}
  OPENVIKING_ROOT_API_KEY: ${OPENVIKING_ROOT_API_KEY:-delegate-local-root-key}
  OPENVIKING_TIMEOUT_MS: ${OPENVIKING_TIMEOUT_MS:-8000}
  OPENVIKING_CONSOLE_URL: ${OPENVIKING_CONSOLE_URL:-http://localhost:8020/docs}
  OPENVIKING_AGENT_ID_PREFIX: ${OPENVIKING_AGENT_ID_PREFIX:-delegate-rep}
  OPENVIKING_RESOURCE_SYNC_ENABLED: ${OPENVIKING_RESOURCE_SYNC_ENABLED:-true}
  OPENVIKING_AUTO_RECALL_DEFAULT: ${OPENVIKING_AUTO_RECALL_DEFAULT:-true}
  OPENVIKING_AUTO_CAPTURE_DEFAULT: ${OPENVIKING_AUTO_CAPTURE_DEFAULT:-true}
  OPENVIKING_PROVIDER: ${OPENVIKING_PROVIDER:-openai}
  OPENVIKING_VLM_MODEL: ${OPENVIKING_VLM_MODEL:-gpt-4o-mini}
  OPENVIKING_EMBEDDING_MODEL: ${OPENVIKING_EMBEDDING_MODEL:-text-embedding-3-large}
  OPENVIKING_EMBEDDING_DIMENSION: ${OPENVIKING_EMBEDDING_DIMENSION:-3072}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
  ARK_API_KEY: ${ARK_API_KEY:-}
  ARK_API_BASE: ${ARK_API_BASE:-https://ark.cn-beijing.volces.com/api/v3}

x-app-service: &app-service
  build:
    context: .
    dockerfile: Dockerfile
  image: delegate-app:local
  working_dir: /app
  environment: *app-environment
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    container_name: delegate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: delegate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - delegate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d delegate"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  artifact-store:
    image: minio/minio:latest
    container_name: delegate-artifact-store
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${ARTIFACT_STORE_ACCESS_KEY:-delegate}
      MINIO_ROOT_PASSWORD: ${ARTIFACT_STORE_SECRET_KEY:-delegate-secret-key}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - delegate-artifact-store-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  artifact-store-init:
    image: minio/mc:latest
    entrypoint: ["/bin/sh", "-c"]
    depends_on:
      artifact-store:
        condition: service_healthy
    environment:
      ARTIFACT_STORE_ENDPOINT: ${ARTIFACT_STORE_ENDPOINT:-http://artifact-store:9000}
      ARTIFACT_STORE_BUCKET: ${ARTIFACT_STORE_BUCKET:-delegate-compute-artifacts}
      ARTIFACT_STORE_ACCESS_KEY: ${ARTIFACT_STORE_ACCESS_KEY:-delegate}
      ARTIFACT_STORE_SECRET_KEY: ${ARTIFACT_STORE_SECRET_KEY:-delegate-secret-key}
    volumes:
      - ./deploy/minio:/opt/delegate-minio:ro
    command: /bin/sh /opt/delegate-minio/bootstrap.sh
    restart: "no"

  browser-image-pull:
    image: ${COMPUTE_BROWSER_IMAGE:-mcr.microsoft.com/playwright:v1.58.2-noble}
    command: ["sh", "-lc", "node -v >/dev/null"]
    restart: "no"

  migrate:
    <<: *app-service
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -lc "pnpm db:deploy && pnpm db:seed"
    restart: "no"

  site:
    <<: *app-service
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: >
      sh -lc "pnpm --filter @delegate/site exec next start -H 0.0.0.0 -p 3000"
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  dashboard:
    <<: *app-service
    depends_on:
      migrate:
        condition: service_completed_successfully
      openviking:
        condition: service_started
    command: >
      sh -lc "pnpm --filter @delegate/dashboard exec next start -H 0.0.0.0 -p 3001"
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  reps:
    <<: *app-service
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: >
      sh -lc "pnpm --filter @delegate/reps exec next start -H 0.0.0.0 -p 3002"
    ports:
      - "3002:3002"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3002').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  bot:
    <<: *app-service
    depends_on:
      migrate:
        condition: service_completed_successfully
      openviking:
        condition: service_started
    command: >
      sh -lc "if [ -n \"$$TELEGRAM_BOT_TOKEN\" ]; then
        pnpm --filter @delegate/bot start;
      else
        echo 'TELEGRAM_BOT_TOKEN is empty. Bot container is idle; set the token to enable Telegram runtime.';
        tail -f /dev/null;
      fi"

  compute-broker:
    <<: *app-service
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      artifact-store-init:
        condition: service_completed_successfully
      browser-image-pull:
        condition: service_completed_successfully
    command: >
      sh -lc "pnpm --filter @delegate/compute-broker start"
    ports:
      - "4010:4010"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4010/health').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  workflow-runner:
    <<: *app-service
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: >
      sh -lc "pnpm --filter @delegate/workflow-runner start"
    ports:
      - "4020:4020"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4020/health').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  openviking:
    image: ghcr.io/volcengine/openviking:main
    container_name: delegate-openviking
    restart: unless-stopped
    environment:
      OPENVIKING_CONFIG_FILE: /etc/openviking/ov.conf
      OPENVIKING_PROVIDER: ${OPENVIKING_PROVIDER:-openai}
      OPENVIKING_VLM_MODEL: ${OPENVIKING_VLM_MODEL:-gpt-4o-mini}
      OPENVIKING_EMBEDDING_MODEL: ${OPENVIKING_EMBEDDING_MODEL:-text-embedding-3-large}
      OPENVIKING_EMBEDDING_DIMENSION: ${OPENVIKING_EMBEDDING_DIMENSION:-3072}
      OPENVIKING_ROOT_API_KEY: ${OPENVIKING_ROOT_API_KEY:-delegate-local-root-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ARK_API_KEY: ${ARK_API_KEY:-}
      ARK_API_BASE: ${ARK_API_BASE:-https://ark.cn-beijing.volces.com/api/v3}
    command: >
      sh -lc "sh /opt/delegate-openviking/entrypoint.sh"
    ports:
      - "1933:1933"
    volumes:
      - ./deploy/openviking:/opt/delegate-openviking:ro
      - openviking-config:/etc/openviking
      - openviking-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s

  openviking-console:
    image: ghcr.io/volcengine/openviking:main
    container_name: delegate-openviking-console
    restart: unless-stopped
    depends_on:
      openviking:
        condition: service_healthy
    command: >
      sh -lc "/app/.venv/bin/python -m openviking.console.bootstrap --host 0.0.0.0 --port 8020 --openviking-url http://openviking:1933"
    ports:
      - "8020:8020"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8020/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  delegate-postgres-data:
  delegate-artifact-store-data:
  openviking-config:
  openviking-data:
